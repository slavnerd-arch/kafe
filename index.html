<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./styles.css">

</head>
<body>
<div class="container">
    <div >
        <h1 class = "header_text">Do you want to get coffee with me?</h1>
    </div>
    <div class="gif_container">
        <img src="https://imgs.search.brave.com/Gdm_bKfLw3GxPx61vMM-BnHubpuIMYPQTLo1VGNKT18/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9naWZk/Yi5jb20vaW1hZ2Vz/L2hpZ2gvY29mZmVl/LWlzLXJlYWR5LXVs/YjM5cnpvYWk3a2R5/M24uZ2lm.gif" alt="Cute animated illustration">
    </div>
    <div class = "buttons">
        <button class="btn" id = "yesButton" onclick="nextPage()">Yes</button>
        <button class="btn" id="noButton" onmouseover="moveButton()" onclick="moveButton()">No</button>
        <script>
            function nextPage() {
                window.location.href = "yes.html";
            }

            function moveButton() {
                var x = Math.random() * (window.innerWidth - document.getElementById('noButton').offsetWidth) - 85;
                var y = Math.random() * (window.innerHeight - document.getElementById('noButton').offsetHeight) - 48;
                document.getElementById('noButton').style.left = `${x}px`;
                document.getElementById('noButton').style.top = `${y}px`;
            }
        </script>
    </div>
</div>

</body>
</html>
